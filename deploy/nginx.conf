# nginx config for GATSV OS Control Plane
# Place at: /etc/nginx/sites-available/gatsv-os
# Enable with: ln -s /etc/nginx/sites-available/gatsv-os /etc/nginx/sites-enabled/
#
# Prerequisites:
#   certbot --nginx -d YOUR_DOMAIN (run after enabling this file with HTTP only first)

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;

    # Let's Encrypt ACME challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN_HERE;

    # TLS — managed by certbot (will fill these in after `certbot --nginx`)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;

    # Proxy to uvicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Forward real client IP — needed for Slack signature verification
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Host             $host;

        # Preserve raw request body for HMAC verification (Slack, Sendblue, Postmark)
        # nginx buffers by default — this is fine; do NOT set proxy_request_buffering off
        # as that breaks signature verification on slow clients.

        # Timeouts — generous for LLM calls (router, operator can take a few seconds)
        proxy_connect_timeout  10s;
        proxy_read_timeout     120s;
        proxy_send_timeout     30s;

        # SSE support (Sendblue webhooks are fast, but keep-alive helps)
        proxy_buffering        off;
        chunked_transfer_encoding on;
    }
}
