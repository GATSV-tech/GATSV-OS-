services:
  control-plane:
    build:
      context: ./services/control-plane
      dockerfile: Dockerfile
    # Bind only to loopback — nginx proxies to this port from outside.
    # Never expose 8000 directly to the internet.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./services/control-plane/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
